version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: complif-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: complif
      POSTGRES_PASSWORD: complif123
      POSTGRES_DB: complif_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - complif-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U complif']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complif-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://complif:complif123@postgres:5432/complif_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      UPLOAD_DIR: /app/uploads
      VALIDATION_SERVICE_URL: http://validation-service:3002
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - complif-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: complif-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - complif-network
    command: npm run dev

  validation-service:
    build:
      context: ./validation-service
      dockerfile: Dockerfile
    container_name: complif-validation
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
    volumes:
      - ./validation-service:/app
      - /app/node_modules
    networks:
      - complif-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  complif-network:
    driver: bridge
